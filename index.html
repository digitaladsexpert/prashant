<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOLD Trading Bot</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🔥 ANIMATED LUXURY BACKGROUND */
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background: linear-gradient(-45deg, #020617, #0f172a, #020617, #1e293b);
  background-size:400% 400%;
  animation:gradientMove 10s ease infinite;
  color:#fff;
  min-height:100vh;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* GOLD GLOW */
body::before{
  content:"";
  position:fixed;
  top:-100px;
  left:-100px;
  width:300px;
  height:300px;
  background:#facc15;
  filter:blur(140px);
  opacity:0.25;
}

body::after{
  content:"";
  position:fixed;
  bottom:-100px;
  right:-100px;
  width:300px;
  height:300px;
  background:#38bdf8;
  filter:blur(140px);
  opacity:0.2;
}

.container{
  padding:18px;
  max-width:480px;
  margin:auto;
  position:relative;
  z-index:1;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:40px;
}

.hero h1{
  font-size:26px;
  background:linear-gradient(90deg,#facc15,#fde68a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  font-size:14px;
  color:#cbd5f5;
  margin-top:8px;
}

/* GLASS CARD */
.card{
  background:rgba(17,24,39,0.6);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:18px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,0.05);
}

/* FEATURES */
.feature{
  display:flex;
  align-items:center;
  margin-bottom:12px;
  font-size:14px;
}

.feature span{
  margin-right:10px;
}

/* CTA TEXT */
.cta-text{
  text-align:center;
  margin-top:20px;
  font-size:14px;
  color:#e2e8f0;
}

/* GOLD BUTTON */
.cta{
  display:block;
  text-align:center;
  margin-top:15px;
  padding:14px;
  background:linear-gradient(90deg,#facc15,#f59e0b);
  color:#000;
  text-decoration:none;
  border-radius:12px;
  font-weight:700;
  box-shadow:0 0 20px rgba(250,204,21,0.4);
}

/* STICKY BUTTON */
.sticky{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:10px;
  background:rgba(2,6,23,0.9);
  backdrop-filter:blur(10px);
  border-top:1px solid #1f2937;
}

.sticky a{
  display:block;
  text-align:center;
  padding:14px;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  color:#000;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
  box-shadow:0 0 15px rgba(34,197,94,0.4);
}

/* FOOTER */
.footer{
  margin-top:30px;
  font-size:12px;
  color:#94a3b8;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>Automated GOLD Trading Bot</h1>
    <p>Smart rule-based trading for XAUUSD</p>
  </div>

  <!-- FEATURES -->
  <div class="card">
    <div class="feature"><span>🤖</span> Automated trading</div>
    <div class="feature"><span>📊</span> Strategy-based execution</div>
    <div class="feature"><span>🛡</span> Risk control system</div>
    <div class="feature"><span>⚡</span> Works on MT4 / MT5</div>
  </div>

  <!-- CTA TEXT -->
  <div class="cta-text">
    📩 Contact us on Telegram for full details and quick support.
  </div>

  <!-- BUTTON -->
  <a href="https://t.me/TeamFxPrashant" class="cta">
    Open Telegram
  </a>

  <!-- FOOTER -->
  <div class="footer">
    Trading involves risk. No guaranteed profit.
  </div>

</div>

<!-- STICKY BUTTON -->
<div class="sticky">
  <a href="https://t.me/TeamFxPrashant">
    🚀 Join on Telegram
  </a>
</div>

</body>
</html>
